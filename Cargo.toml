[package]
edition      = "2024"
name         = "lilygo-rs"
rust-version = "1.88"
version      = "0.1.0"


[dependencies]
esp-hal = { version = "~1.0", features = ["esp32s3", "unstable"] }

esp-rtos = { version = "0.2.0", features = [
  "embassy",
  "esp-alloc",
  "esp32s3",
] }

esp-bootloader-esp-idf = { version = "0.4.0", features = ["esp32s3"] }

esp-alloc = "0.9.0"
rtt-target = "0.6.2"
embassy-executor = { version = "0.9.1", features = [] }
embassy-time = "0.5.0"

critical-section = "1.2.0"
static_cell      = "2.1.1"
embassy-futures = "0.1"
embassy-sync     = "0.5"

display-interface-spi = "0.5"
mipidsi = { version = "0.8", default-features = false, features = ["batch"] }
embedded-graphics = "0.8"
embedded-hal-bus = "0.3"
mousefood = { version = "0.4", default-features = false, features = ["fonts"] }
ratatui = { version = "0.30", default-features = false }


[profile.dev]
opt-level = 3

[profile.release]
codegen-units    = 1
debug            = 2
debug-assertions = false
incremental      = false
lto              = 'fat'
opt-level        = 3
overflow-checks  = false
